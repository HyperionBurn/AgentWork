# ============================================================
# AgentWork — Docker Compose
# One command to spin up the entire stack
# ============================================================

version: "3.8"

# Shared volumes for demo evidence (#10)
volumes:
  evidence:
    driver: local

services:
  # ---- Dashboard (Next.js) ----
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_RESEARCH_AGENT_URL: http://agent-gateway:4021
        NEXT_PUBLIC_CODE_AGENT_URL: http://agent-gateway:4022
        NEXT_PUBLIC_TEST_AGENT_URL: http://agent-gateway:4023
        NEXT_PUBLIC_REVIEW_AGENT_URL: http://agent-gateway:4024
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - ARC_CHAIN_ID=${ARC_CHAIN_ID:-5042002}
      - ARC_RPC_URL=${ARC_RPC_URL:-https://rpc.testnet.arc.network}
      - ARC_USDC_ADDRESS=${ARC_USDC_ADDRESS:-0x3600000000000000000000000000000000000000}
      - ARC_GATEWAY_ADDRESS=${ARC_GATEWAY_ADDRESS:-0x0077777d7EBA4688BDeF3E311b846F25870A19B9}
      - ARC_EXPLORER=${ARC_EXPLORER:-https://testnet.arcscan.io/tx/}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_RESEARCH_AGENT_URL=http://agent-gateway:4021
      - NEXT_PUBLIC_CODE_AGENT_URL=http://agent-gateway:4022
      - NEXT_PUBLIC_TEST_AGENT_URL=http://agent-gateway:4023
      - NEXT_PUBLIC_REVIEW_AGENT_URL=http://agent-gateway:4024
      - SELLER_WALLET=${SELLER_WALLET:-}
    depends_on:
      - agent-gateway

  # ---- Orchestrator (TypeScript) ----
  orchestrator:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-4030}:4030"
    environment:
      - ORCHESTRATOR_PRIVATE_KEY=${ORCHESTRATOR_PRIVATE_KEY}
      - RESEARCH_AGENT_PORT=4021
      - CODE_AGENT_PORT=4022
      - TEST_AGENT_PORT=4023
      - REVIEW_AGENT_PORT=4024
      - DEMO_TASK=${DEMO_TASK:-Build a REST API with user authentication, CRUD endpoints, and unit tests}
      - DEMO_RUNS=${DEMO_RUNS:-15}
      - USE_PARALLEL=${USE_PARALLEL:-true}
      - USE_REAL_LLM=${USE_REAL_LLM:-false}
      - USE_LLM_DECOMPOSER=${USE_LLM_DECOMPOSER:-false}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - RESEARCH_AGENT_URL=http://agent-gateway:4021
      - CODE_AGENT_URL=http://agent-gateway:4022
      - TEST_AGENT_URL=http://agent-gateway:4023
      - REVIEW_AGENT_URL=http://agent-gateway:4024
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - IDENTITY_REGISTRY_ADDRESS=${IDENTITY_REGISTRY_ADDRESS:-}
      - REPUTATION_REGISTRY_ADDRESS=${REPUTATION_REGISTRY_ADDRESS:-}
      - AGENT_ESCROW_ADDRESS=${AGENT_ESCROW_ADDRESS:-}
    volumes:
      - evidence:/app/evidence
    depends_on:
      - agent-gateway

  # ---- Agent Gateway (Node.js + Real x402) ----
  agent-gateway:
    build:
      context: ./agents/express-server
      dockerfile: Dockerfile
    ports:
      - "4021:4021"
      - "4022:4022"
      - "4023:4023"
      - "4024:4024"
    environment:
      - SELLER_WALLET=${SELLER_WALLET}
      - RESEARCH_AGENT_PORT=4021
      - CODE_AGENT_PORT=4022
      - TEST_AGENT_PORT=4023
      - REVIEW_AGENT_PORT=4024
      - RESEARCH_AGENT_PRICE=${RESEARCH_AGENT_PRICE:-$0.005}
      - CODE_AGENT_PRICE=${CODE_AGENT_PRICE:-$0.005}
      - TEST_AGENT_PRICE=${TEST_AGENT_PRICE:-$0.005}
      - REVIEW_AGENT_PRICE=${REVIEW_AGENT_PRICE:-$0.005}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4021/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---- Orchestrator Demo ----
  orchestrator-demo:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile
    environment:
      - ORCHESTRATOR_PRIVATE_KEY=${ORCHESTRATOR_PRIVATE_KEY}
      - DEMO_TASK=${DEMO_TASK:-Build a REST API with user authentication, CRUD endpoints, and unit tests}
      - DEMO_RUNS=${DEMO_RUNS:-15}
      - USE_PARALLEL=true
      - RESEARCH_AGENT_URL=http://agent-gateway:4021
      - CODE_AGENT_URL=http://agent-gateway:4022
      - TEST_AGENT_URL=http://agent-gateway:4023
      - REVIEW_AGENT_URL=http://agent-gateway:4024
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - IDENTITY_REGISTRY_ADDRESS=${IDENTITY_REGISTRY_ADDRESS:-}
      - REPUTATION_REGISTRY_ADDRESS=${REPUTATION_REGISTRY_ADDRESS:-}
      - AGENT_ESCROW_ADDRESS=${AGENT_ESCROW_ADDRESS:-}
      - PAYMENT_SPLITTER_ADDRESS=${PAYMENT_SPLITTER_ADDRESS:-}
      - SPENDING_LIMITER_ADDRESS=${SPENDING_LIMITER_ADDRESS:-}
    volumes:
      - evidence:/app/evidence
    depends_on:
      agent-gateway:
        condition: service_healthy
    profiles:
      - demo
