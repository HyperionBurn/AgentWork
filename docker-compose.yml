# ============================================================
# AgentWork — Docker Compose
# One command to spin up the entire stack
# ============================================================

version: "3.8"

services:
  # ---- Dashboard (Next.js) ----
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_RESEARCH_AGENT_URL: http://research-agent:4021
        NEXT_PUBLIC_CODE_AGENT_URL: http://code-agent:4022
        NEXT_PUBLIC_TEST_AGENT_URL: http://test-agent:4023
        NEXT_PUBLIC_REVIEW_AGENT_URL: http://review-agent:4024
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - ARC_CHAIN_ID=${ARC_CHAIN_ID:-5042002}
      - ARC_RPC_URL=${ARC_RPC_URL:-https://rpc.testnet.arc.network}
      - ARC_USDC_ADDRESS=${ARC_USDC_ADDRESS:-0x3600000000000000000000000000000000000000}
      - ARC_GATEWAY_ADDRESS=${ARC_GATEWAY_ADDRESS:-0x0077777d7EBA4688BDeF3E311b846F25870A19B9}
      - ARC_EXPLORER=${ARC_EXPLORER:-https://testnet.arcscan.io/tx/}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_RESEARCH_AGENT_URL=http://research-agent:4021
      - NEXT_PUBLIC_CODE_AGENT_URL=http://code-agent:4022
      - NEXT_PUBLIC_TEST_AGENT_URL=http://test-agent:4023
      - NEXT_PUBLIC_REVIEW_AGENT_URL=http://review-agent:4024
      - SELLER_WALLET=${SELLER_WALLET:-}
    depends_on:
      - research-agent
      - code-agent
      - test-agent
      - review-agent

  # ---- Orchestrator (TypeScript) ----
  # Note: No healthcheck — orchestrator is a one-shot batch job,
  # not a long-running service. It runs DEMO_RUNS iterations and exits.
  orchestrator:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-4030}:4030"
    environment:
      - ORCHESTRATOR_PRIVATE_KEY=${ORCHESTRATOR_PRIVATE_KEY}
      - RESEARCH_AGENT_PORT=4021
      - CODE_AGENT_PORT=4022
      - TEST_AGENT_PORT=4023
      - REVIEW_AGENT_PORT=4024
      - DEMO_TASK=${DEMO_TASK:-Build a REST API with user authentication, CRUD endpoints, and unit tests}
      - DEMO_RUNS=${DEMO_RUNS:-15}
      - RESEARCH_AGENT_URL=http://research-agent:4021
      - CODE_AGENT_URL=http://code-agent:4022
      - TEST_AGENT_URL=http://test-agent:4023
      - REVIEW_AGENT_URL=http://review-agent:4024
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    depends_on:
      - research-agent
      - code-agent
      - test-agent
      - review-agent

  # ---- Research Agent (Python + Flask) ----
  research-agent:
    build:
      context: ./agents/research-agent
      dockerfile: Dockerfile
    ports:
      - "${RESEARCH_AGENT_PORT:-4021}:4021"
    environment:
      - RESEARCH_AGENT_PORT=4021
      - RESEARCH_AGENT_PRICE=${RESEARCH_AGENT_PRICE:-$0.005}
      - RESEARCH_AGENT_WALLET=${SELLER_WALLET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4021/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---- Code Agent (Python + Flask) ----
  code-agent:
    build:
      context: ./agents/code-agent
      dockerfile: Dockerfile
    ports:
      - "${CODE_AGENT_PORT:-4022}:4022"
    environment:
      - CODE_AGENT_PORT=4022
      - CODE_AGENT_PRICE=${CODE_AGENT_PRICE:-$0.005}
      - CODE_AGENT_WALLET=${SELLER_WALLET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4022/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---- Test Agent (Python + Flask) ----
  test-agent:
    build:
      context: ./agents/test-agent
      dockerfile: Dockerfile
    ports:
      - "${TEST_AGENT_PORT:-4023}:4023"
    environment:
      - TEST_AGENT_PORT=4023
      - TEST_AGENT_PRICE=${TEST_AGENT_PRICE:-$0.005}
      - TEST_AGENT_WALLET=${SELLER_WALLET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4023/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---- Review Agent (Python + Flask) ----
  review-agent:
    build:
      context: ./agents/review-agent
      dockerfile: Dockerfile
    ports:
      - "${REVIEW_AGENT_PORT:-4024}:4024"
    environment:
      - REVIEW_AGENT_PORT=4024
      - REVIEW_AGENT_PRICE=${REVIEW_AGENT_PRICE:-$0.005}
      - REVIEW_AGENT_WALLET=${SELLER_WALLET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4024/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
