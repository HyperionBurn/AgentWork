name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install

      - name: Type-check dashboard
        run: npx tsc --noEmit -p packages/dashboard/tsconfig.json

      - name: Type-check orchestrator
        run: npx tsc --noEmit -p packages/orchestrator/tsconfig.json

      - name: Validate env schema
        run: npx tsx scripts/validate-env.ts -- --schema-only

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for private key patterns..."
          # Match 0x followed by 64 hex chars (private key pattern)
          # Exclude .env.example, .gitignore, AGENTS.md, and docs
          grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.py" \
            -E '0x[0-9a-fA-F]{64}' \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            packages/ agents/ scripts/ || echo "No hardcoded secrets found ✅"

      - name: Validate file structure
        run: |
          echo "Checking expected directories..."
          for dir in packages/dashboard packages/orchestrator packages/contracts agents/research-agent agents/code-agent agents/test-agent agents/review-agent scripts docs; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing directory: $dir"
              exit 1
            fi
            echo "  ✅ $dir"
          done

          echo "Checking expected files..."
          for file in .env.example docker-compose.yml package.json AGENTS.md README.md packages/database/schema.sql; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing file: $file"
              exit 1
            fi
            echo "  ✅ $file"
          done

      - name: Python syntax check
        run: |
          python -m py_compile agents/research-agent/server.py
          python -m py_compile agents/code-agent/server.py
          python -m py_compile agents/test-agent/server.py
          python -m py_compile agents/review-agent/server.py
          echo "Python syntax OK ✅"
