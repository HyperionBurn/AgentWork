<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0A0A" stroke="#F97316" stroke-width="2"/>
  <!-- Agent node center -->
  <circle cx="32" cy="26" r="6" fill="#F97316"/>
  <!-- Connecting lines to sub-nodes -->
  <line x1="32" y1="32" x2="18" y2="44" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="32" y2="48" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="46" y2="44" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Sub-nodes -->
  <circle cx="18" cy="44" r="4" fill="#F97316" opacity="0.8"/>
  <circle cx="32" cy="48" r="4" fill="#F97316" opacity="0.8"/>
  <circle cx="46" cy="44" r="4" fill="#F97316" opacity="0.8"/>
  <!-- Pulse rings -->
  <circle cx="32" cy="26" r="10" stroke="#F97316" stroke-width="1" opacity="0.3"/>
</svg>
